name: 🚀 Deploy Frontend to GitHub Pages

on:
  workflow_dispatch:  # Botón manual en GitHub UI
  push:
    branches: [main]
    paths:
      - 'system_core/client/**'
      - 'system_core/core/**'
      - '.github/workflows/deploy-ui.yml'

permissions:
  contents: write  # Necesario para escribir a gh-pages branch

jobs:
  deploy:
    name: Build & Deploy UI
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'system_core/client/package-lock.json'

      - name: 🏗️ Run Indra Loom (Auto-Manifest)
        run: node scripts/generate_manifest.js

      - name: 🔄 Commit Manifest changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 [Indra Loom] Sincronización automática de Manifiesto"
          file_pattern: 'system_core/core/files_manifest.json'
      
      - name: 📦 Install dependencies
        working-directory: system_core/client
        run: npm ci
      
      - name: 🔨 Build frontend
        working-directory: system_core/client
        env:
          VITE_GAS_URL: 'https://placeholder-backend.example.com'
        run: npm run build
      
      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./system_core/client/dist
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy INDRA UI'
          
      - name: ✅ Deployment complete
        run: |
          echo "::notice::Frontend deployed successfully!"
          echo "::notice::URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

