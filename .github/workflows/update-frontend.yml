name: Deploy Indra OS Shell to GitHub Pages

on:
  push:
    branches: ['main']
    paths:
      - 'system_core/client/**'
      - '.github/workflows/update-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: system_core/client
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # Asegura que se descargue el satélite

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'system_core/client/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Set Release Metadata
        run: |
          echo "VITE_BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> .env
          echo "VITE_BUILD_COMMIT=${{ github.sha }}" >> .env
          echo "VITE_APP_VERSION=2.0.0-resonance" >> .env

      - name: Build Production UI
        run: |
          npm run build
          # Hack para GitHub Pages + React Router: Redireccionar 404s al index.html
          cp dist/index.html dist/404.html
          # Neutralizar Jekyll para que no borre carpetas con "_"
          touch dist/.nojekyll

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './system_core/client/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
